<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAPPY BIRTHDAY</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff758c,#ff7eb3);
      font-family:Arial, sans-serif;
    }

    .card{
      background:white;
      width:350px;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff4d6d;
    }

    p{
      font-size:18px;
      color:#444;
      line-height:1.6;
    }

    .heart{
      font-size:50px;
      animation:beat 1s infinite;
    }

    button{
      margin-top:15px;
      padding:12px 20px;
      border:none;
      border-radius:30px;
      background:#ff4d6d;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#e63956;
    }

    img{
      width:220px;
      border-radius:15px;
      margin-top:20px;
      display:none;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes beat{
      0%{transform:scale(1);}
      50%{transform:scale(1.15);}
      100%{transform:scale(1);}
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Belated Happy Birthday my little princess ❤️</h1>

    <div class="heart">💖</div>

   
<a href="Love.html">
<button>Click me><button>
</a>
</div>
</body>
</html>
